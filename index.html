<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow-color: rgba(148, 163, 184, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px 32px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px var(--shadow-color), 0 8px 10px -6px var(--shadow-color);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            transition: transform 0.2s ease;
        }

        .info-item:hover {
            transform: translateY(-2px);
        }

        .label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Thông tin cá nhân</h1>
        <div class="info-group">
            <div class="info-item">
                <span class="label">Họ và tên</span>
                <span class="value">Nguyễn Trần Khôi Nguyên</span>
            </div>
            <div class="info-item">
                <span class="label">Giới tính</span>
                <span class="value">Nam</span>
            </div>
        </div>
    </div>

</body>
</html>
